name: daily-logistics-pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "0 15 * * *"

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: project
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        working-directory: project
        env:
          SOURCE_XLSX_URL: ${{ vars.SOURCE_XLSX_URL }}
          CAS_ALERT_DAYS: ${{ vars.CAS_ALERT_DAYS || '3' }}
          TIMEZONE: America/Guayaquil
        run: python -m src.main

      - name: Run tests
        working-directory: project
        run: pytest

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add project/data project/logs
          git diff --cached --quiet || git commit -m "chore: refresh logistics snapshots"
          git push
