name: daily-logistics-pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "0 16 * * *"
    - cron: "0 4 * * *"

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        env:
          SOURCE_XLSX_URL: ${{ vars.SOURCE_XLSX_URL }}
          CAS_ALERT_DAYS: ${{ vars.CAS_ALERT_DAYS || '3' }}
          TIMEZONE: America/Guayaquil
          GOOGLE_SHEETS_ENABLE_PROTECTION: ${{ vars.GOOGLE_SHEETS_ENABLE_PROTECTION || 'false' }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python -m src.main

      - name: Run tests
        run: pytest

      - name: Publish run summary
        run: |
          python - <<'PY'
          from pathlib import Path
          import pandas as pd
          import os

          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])

          def read_csv(path_str: str) -> pd.DataFrame:
              path = Path(path_str)
              if not path.exists():
                  return pd.DataFrame()
              return pd.read_csv(path)

          current = read_csv("data/curated/contenedores_actual.csv")
          status = read_csv("data/history/status_historico.csv")
          registro = read_csv("data/history/registro_congelado.csv")
          plan = read_csv("data/history/plan_galagans_congelado.csv")
          asignacion = read_csv("data/history/asignacion_plan_grupasa.csv")
          quality = read_csv("data/quality/errores_validacion.csv")
          dim_contenedor = read_csv("data/powerbi/dim_contenedor.csv")
          dim_fecha = read_csv("data/powerbi/dim_fecha.csv")
          dim_status = read_csv("data/powerbi/dim_status.csv")
          dim_bodega = read_csv("data/powerbi/dim_bodega.csv")
          fact_status = read_csv("data/powerbi/fact_status_diario.csv")
          fact_plan = read_csv("data/powerbi/fact_plan_actual.csv")

          latest_snapshot = ""
          if not current.empty and "fecha_snapshot" in current.columns:
              latest_snapshot = str(current["fecha_snapshot"].max())
          elif not status.empty and "fecha_snapshot" in status.columns:
              latest_snapshot = str(status["fecha_snapshot"].max())

          lines = [
              "# Pipeline Summary",
              "",
              f"- Latest snapshot date: `{latest_snapshot or 'n/a'}`",
              f"- Current containers: `{len(current)}`",
              f"- Status history rows: `{len(status)}`",
              f"- Registro frozen rows: `{len(registro)}`",
              f"- Plan Galagans frozen rows: `{len(plan)}`",
              f"- Grupasa assignment rows: `{len(asignacion)}`",
              f"- Power BI dim_contenedor rows: `{len(dim_contenedor)}`",
              f"- Power BI dim_fecha rows: `{len(dim_fecha)}`",
              f"- Power BI dim_status rows: `{len(dim_status)}`",
              f"- Power BI dim_bodega rows: `{len(dim_bodega)}`",
              f"- Power BI fact_status_diario rows: `{len(fact_status)}`",
              f"- Power BI fact_plan_actual rows: `{len(fact_plan)}`",
              f"- Validation issues: `{max(len(quality) - 1, 0) if list(quality.columns) == ['fecha_snapshot','sheet_name','severity','error_code','contenedor_id','detail'] and quality.empty else len(quality)}`",
          ]

          if not quality.empty:
              lines.extend(
                  [
                      "",
                      "## Validation Issue Breakdown",
                      "",
                  ]
              )
              breakdown = (
                  quality.groupby(["severity", "error_code"], dropna=False)
                  .size()
                  .reset_index(name="count")
                  .sort_values(["severity", "error_code"])
              )
              for row in breakdown.itertuples(index=False):
                  lines.append(f"- `{row.severity}` / `{row.error_code}`: `{row.count}`")

          summary_path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data logs
          if git diff --cached --quiet; then
            echo "No generated file changes to commit."
          else
            git commit -m "chore: refresh logistics snapshots"
            git push
          fi
